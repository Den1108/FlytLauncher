name: Java CI Build EXE

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest # Теперь собираем на Windows для получения .exe
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn package

    - name: Create EXE with JPackage
      run: |
        jpackage --input target/ `
                 --name FlytLauncher `
                 --main-jar FlytLauncher-1.0-SNAPSHOT.jar `
                 --main-class com.flyt.Main `
                 --type exe `
                 --dest output/ `
                 --win-dir-chooser `
                 --win-menu `
                 --win-shortcut `
                 --about-url "https://github.com/${{ github.repository }}"

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: FlytLauncher-Windows-EXE
        path: output/*.exe