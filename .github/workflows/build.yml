name: Java CI with Maven

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4 # Обновлено с v3 на v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4 # Обновлено с v3 на v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn package

    - name: Upload Artifact
      uses: actions/upload-artifact@v4 # Обновлено с v3 на v4
      with:
        name: FlytLauncher-Build
        path: target/*.jar