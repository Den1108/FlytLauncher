name: Java CI Build EXE

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn package

    - name: Convert PNG to ICO
      run: |
        pip install Pillow --quiet
        python -c "
        from PIL import Image
        import os
        src = 'src/main/resources/icon.png'
        dst = 'src/main/resources/icon.ico'
        if os.path.exists(src):
            img = Image.open(src).convert('RGBA')
            img.save(dst, format='ICO', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])
            print('icon.ico created')
        else:
            print('No icon.png found, skipping')
        "

    - name: Create EXE with JPackage (with icon)
      if: hashFiles('src/main/resources/icon.ico') != ''
      run: |
        jpackage `
          --input target/ `
          --name FlytLauncher `
          --main-jar FlytLauncher-1.0-SNAPSHOT.jar `
          --main-class com.flyt.Main `
          --type exe `
          --dest output/ `
          --icon src/main/resources/icon.ico `
          --win-dir-chooser `
          --win-menu `
          --win-shortcut `
          --win-shortcut-prompt `
          --app-version "1.0.0" `
          --description "FlytLauncher - Minecraft Launcher" `
          --vendor "FlytLauncher" `
          --about-url "https://github.com/${{ github.repository }}"

    - name: Create EXE with JPackage (no icon)
      if: hashFiles('src/main/resources/icon.ico') == ''
      run: |
        jpackage `
          --input target/ `
          --name FlytLauncher `
          --main-jar FlytLauncher-1.0-SNAPSHOT.jar `
          --main-class com.flyt.Main `
          --type exe `
          --dest output/ `
          --win-dir-chooser `
          --win-menu `
          --win-shortcut `
          --win-shortcut-prompt `
          --app-version "1.0.0" `
          --description "FlytLauncher - Minecraft Launcher" `
          --vendor "FlytLauncher" `
          --about-url "https://github.com/${{ github.repository }}"

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: FlytLauncher-Windows-EXE
        path: output/*.exe
        retention-days: 30
